services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: elasticsearch_recuperacao_logs
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false  # Desativa login/senha para facilitar dev local
      - xpack.security.http.ssl.enabled=false # Desativa HTTPS
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Limita memória (ajuste se necessário)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  api:
    build: ./server
    container_name: api_recuperacao_logs
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy

  frontend:
    build: .
    container_name: frontend_recuperacao_logs
    ports:
      - "3000:3000"
    depends_on:
      - api


volumes:
  es_data:
    driver: local